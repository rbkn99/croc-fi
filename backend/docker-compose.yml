services:
  postgres:
    image: postgres:17-alpine
    container_name: prooflayer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prooflayer
      POSTGRES_PASSWORD: prooflayer
      POSTGRES_DB: prooflayer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prooflayer"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
